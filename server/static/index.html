<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>
            Select File - RV32IMA Emulator
        </title>
    </head>
    <body>
        <h1>
            Please select a local file or browse files from the server
        </h1>
        <input id="localSelector" type="file">
        <button id="remoteSelector">Use payload.bin (download)</button>
    </body>
    <script defer>
        const localSelector = document.getElementById("localSelector")
        const remoteSelector = document.getElementById("remoteSelector")

        remoteSelector.addEventListener("click", () => {
            fetch('/payload.bin').then(res => res.arrayBuffer()).then(buffer => {
                sessionStorage.setItem('binaryFileData', JSON.stringify({
                    name: 'test.bin',
                    type: 'application/octet-stream',
                    data: Array.from(new Uint8Array(buffer))
                }));
                window.location.href = '/emulator';
            });
        })
        localSelector.addEventListener("change", (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const arrayBuffer = event.target.result;
                sessionStorage.setItem('binaryFileData', JSON.stringify({
                name: file.name,
                type: file.type,
                data: Array.from(new Uint8Array(arrayBuffer))
                }));
                window.location.href = '/emulator';
            };
            reader.readAsArrayBuffer(file);
        })
    </script>
</html>
