<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Running - RV32IMA Emulator</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                background: #1a1a1a;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                font-family: monospace;
            }
            #terminal {
                width: 800px;
                height: 500px;
                background: #0d0d0d;
                color: #33ff33;
                font-family: 'Courier New', monospace;
                font-size: 14px;
                padding: 12px;
                border: 1px solid #333;
                border-radius: 4px;
                resize: none;
                outline: none;
                overflow-y: scroll;
                white-space: pre;
                /* Make it look read-only but still focusable for keydown */
                caret-color: transparent;
            }
            #status {
                color: #555;
                font-size: 0.75rem;
                margin-top: 6px;
            }
        </style>
    </head>
    <body>
        <div id="config-box">
            <h3>Choose Program</h3>
            <input id="fileSelect" type="file">
            <h3>Choose DTB file</h3>
            <input id="dtbSelect" type="file">
            <br>
            <button id="run">Run</button>
        </div>
        <div id="terminal" tabindex="0"></div>
        <div id="status">Loading wasm...</div>
        <script>
            // HTML elements
            const fileSelect = document.getElementById("fileSelect")
            const dtbSelect = document.getElementById("dtbSelect")
            const runBtn = document.getElementById("run")
            const terminal = document.getElementById("terminal")
            const status = document.getElementById("status")
            fileSelect.disabled = true;
            dtbSelect.disabled = true;
            runBtn.disabled = true;

            // terminal buffer
            let content = ''
            let romBuffer = null;
            let dtbBuffer = null;

            // Called from C++ via EM_ASM when the UART transmits a byte
            function js_uart_write(byte) {
                const ch = String.fromCharCode(byte);
                content += ch
                terminal.textContent = content
                terminal.scrollTop = terminal.scrollHeight
            }

            // handle input
            terminal.addEventListener('keydown', e => {
                e.preventDefault()
                if (!Module._uart_push_byte) return
                if (e.key.length === 1) {
                    Module._uart_push_byte(e.key.charCodeAt(0))
                } else if (e.key === 'Enter') {
                    Module._uart_push_byte(13)
                } else if (e.key === 'Backspace') {
                    Module._uart_push_byte(127)
                } else if (e.key === 'ArrowUp') {
                    Module._uart_push_byte(27); Module._uart_push_byte(91); Module._uart_push_byte(65)
                } else if (e.key === 'ArrowDown') {
                    Module._uart_push_byte(27); Module._uart_push_byte(91); Module._uart_push_byte(66)
                }
            })
            terminal.addEventListener('click', () => terminal.focus())

            // just store the file when selected, don't load yet
            fileSelect.addEventListener("change", e => {
                const file = e.target.files[0];
                if (!file) return;
                file.arrayBuffer().then(buf => {
                    romBuffer = new Uint8Array(buf);
                    status.textContent = "ROM ready (" + romBuffer.length + " bytes)"
                    updateRunButton();
                });
            });

            dtbSelect.addEventListener("change", e => {
                const file = e.target.files[0];
                if (!file) return;
                file.arrayBuffer().then(buf => {
                    dtbBuffer = new Uint8Array(buf);
                    status.textContent = "DTB ready (" + dtbBuffer.length + " bytes)"
                    updateRunButton();
                });
            });

            // only enable run when both files are loaded
            function updateRunButton() {
                runBtn.disabled = !(romBuffer && dtbBuffer);
            }

            runBtn.addEventListener("click", () => {
                if (!romBuffer || !dtbBuffer) return;
                // Module._set_debug(true)

                status.textContent = "Loading ROM..."
                const romPtr = Module._malloc(romBuffer.length)
                Module.HEAPU8.set(romBuffer, romPtr)
                Module._load_rom(romPtr, romBuffer.length)
                Module._free(romPtr)

                status.textContent = "Loading DTB..."
                const dtbPtr = Module._malloc(dtbBuffer.length)
                Module.HEAPU8.set(dtbBuffer, dtbPtr)
                Module._load_dtb(dtbPtr, dtbBuffer.length)
                Module._free(dtbPtr)

                status.textContent = "Running — " + romBuffer.length + " byte ROM, " + dtbBuffer.length + " byte DTB"
                terminal.focus()
            });

            var Module = {
                onRuntimeInitialized: function () {
                    status.textContent = "Wasm loaded — select ROM and DTB to continue"
                    terminal.focus()
                    fileSelect.disabled = false
                    dtbSelect.disabled = false
                }
            };
        </script>
        <!-- Emscripten-generated JS loader -->
        <script src="emulator.js"></script>
    </body>
</html>
