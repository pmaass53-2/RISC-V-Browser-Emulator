<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Running - RV32IMA Emulator</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
        <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                background: #1a1a1a;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                font-family: monospace;
            }
            #status {
                color: #555;
                font-size: 0.75rem;
                margin-top: 6px;
            }
            #config-box {
                display: flex;
                align-items: center;
                gap: 5px;
                position: absolute;
                top: 0px;
                left: 0px;
                padding: 30px;
                border: 1px solid black;
                width: 100vw;
            }
            #config-box h3 {
                margin: 0;
                font-size: 1rem;
            }
            main {
                display: flex;
                align-items: center;
                gap: 50px;
            }
            #display {
                width: 250px;
                height: 400px;
                padding: 25px;
                background-color: black;
                color: #00ff00;
            }
        </style>
    </head>
    <body>
        <div id="config-box">
            <h3>Choose Program</h3>
            <input id="fileSelect" type="file">
            <h3>Choose DTB file</h3>
            <input id="dtbSelect" type="file">
            <br>
            <button id="run">Run</button>
        </div>
        <main>
            <div id="terminal" style="width: 800px; height: 400px;"></div>
            <div id="display"></div>
        </main>
        <div id="status">Loading wasm...</div>
        <script>
            // HTML elements
            const fileSelect = document.getElementById("fileSelect")
            const dtbSelect = document.getElementById("dtbSelect")
            const runBtn = document.getElementById("run")
            const status = document.getElementById("status")
            const terminal = document.getElementById("terminal")
            const display = document.getElementById("display")
            // initialize buttons as disabled untill WASM loads
            fileSelect.disabled = true;
            dtbSelect.disabled = true;
            runBtn.disabled = true;
            // buffers for input elements
            let romBuffer = null;
            let dtbBuffer = null;

            // functions
            function js_uart_write(byte) {
                term.write(new Uint8Array([byte]));
            }
            function updateRunButton() {
                runBtn.disabled = !(romBuffer && dtbBuffer);
            }
            // event listeners
            fileSelect.addEventListener("change", e => {
                const file = e.target.files[0];
                if (!file) return;
                file.arrayBuffer().then(buf => {
                    romBuffer = new Uint8Array(buf);
                    status.textContent = "ROM ready (" + romBuffer.length + " bytes)"
                    updateRunButton();
                });
            });
            dtbSelect.addEventListener("change", e => {
                const file = e.target.files[0];
                if (!file) return;
                file.arrayBuffer().then(buf => {
                    dtbBuffer = new Uint8Array(buf);
                    status.textContent = "DTB ready (" + dtbBuffer.length + " bytes)"
                    updateRunButton();
                });
            });

            runBtn.addEventListener("click", () => {
                if (!romBuffer || !dtbBuffer) return;
                // Module._set_debug(true)
                // load ROM and copy over to the emulator
                status.textContent = "Loading ROM..."
                const romPtr = Module._malloc(romBuffer.length)
                Module.HEAPU8.set(romBuffer, romPtr)
                Module._load_rom(romPtr, romBuffer.length)
                Module._free(romPtr)
                // load DTB and copy over to the emulator
                status.textContent = "Loading DTB..."
                const dtbPtr = Module._malloc(dtbBuffer.length)
                Module.HEAPU8.set(dtbBuffer, dtbPtr)
                Module._load_dtb(dtbPtr, dtbBuffer.length)
                Module._free(dtbPtr)
                // update status
                status.textContent = "Running"
                term.focus()
                runBtn.disabled = true
                fileSelect.disabled = true;
                dtbSelect.disabled = true;
            });

            // Initialize Xterm
            const term = new Terminal({
                cursorBlink: true,
                rows: 24,
                cols: 80,
                theme: {
                    background: "#000000",
                    foreground: "#00ff00"
                }
            });
            term.onData(data => {
                for (let i = 0; i < data.length; i++) {
                    const char = data.charCodeAt(i)
                    Module._uart_push_byte(char)
                }
            })
            // Attach it to the DOM
            term.open(terminal);
            // polling loop
            var last_cycle = 0
            const poll = setInterval(() => {
                // poll
                const cycle = Module._get_cycle()
                const pc = Module._get_pc()
                const inst_reg = Module._get_instruction()
                // calculate
                const mips = (cycle - last_cycle) / 1000000
                const line = "0x" + (pc >>> 0).toString(16).padStart(8, '0').toUpperCase()
                const instruction = "0x" + (inst_reg >>> 0).toString(16).padStart(8, '0').toUpperCase()
                // render
                display.innerHTML = `<h3>[ CPU STATE ]</h3><h3>MIPS: ${mips}</h3><h3>PC: ${line}</h3><h3>INST: ${instruction}`
                // update
                last_cycle = cycle
            }, 1000)
            // init WASM
            var Module = {
                onRuntimeInitialized: function () {
                    status.textContent = "Wasm loaded"
                    terminal.focus()
                    fileSelect.disabled = false
                    dtbSelect.disabled = false
                }
            };
        </script>
        <!-- Emscripten-generated JS loader -->
        <script src="emulator.js"></script>
    </body>
</html>
